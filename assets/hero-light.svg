    <text x="6.0" y="196" textLength="806.9" lengthAdjust="spacing">     +                *                             \     `=./`,        '                         .</text>
    <text x="6.0" y="212" textLength="855.8" lengthAdjust="spacing">          '                                      .   '=.__.=' `='      *                      +         '</text>
    <text x="6.0" y="228" textLength="709.1" lengthAdjust="spacing">                .                       +                         +                   *</text>
