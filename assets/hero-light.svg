    <text class="body" x="6.0" y="180" textLength="513.5" lengthAdjust="spacing">                              +                *   |  '=._    |</text>
    <text class="body" x="6.0" y="196" textLength="815.0" lengthAdjust="spacing">                                      .             \     `=./`,        '                          .</text>
    <text class="body" x="6.0" y="212" textLength="586.8" lengthAdjust="spacing">                                            .    .   '=.__.=' `=' +    *</text>
