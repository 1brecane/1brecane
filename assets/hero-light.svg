<svg xmlns="http://www.w3.org/2000/svg" width="880" height="290" viewBox="0 0 880 290" role="img" aria-label="Samuele Ruaro">
  <style>
    .in { animation: fadein 1.4s ease-out both; }
    @keyframes fadein { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .glow { animation: pulse 5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.85; } 50% { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      .in, .glow { animation: none; }
    }
  </style>

  <text class="in" x="440" y="56" text-anchor="middle" font-family="'Segoe UI',Ubuntu,Roboto,'Helvetica Neue',Arial,sans-serif" font-size="42" font-weight="700" fill="#1b1f27" letter-spacing="1">Samuele Ruaro</text>

  <g class="glow" fill="#c1272d" font-family="'JetBrains Mono','Fira Code',Consolas,'Liberation Mono',Menlo,monospace" font-size="14" xml:space="preserve">
    <text x="289" y="100">   .       +                    *</text>
    <text x="289" y="132">                 *       +</text>
    <text x="289" y="148">           '                  |</text>
    <text x="289" y="164">       ()    .-.,="``"=.    - o -</text>
    <text x="289" y="180">             '=/_       \     |</text>
    <text x="289" y="196">          *   |  '=._    |</text>
    <text x="289" y="212">               \     `=./`,        '</text>
    <text x="289" y="228">            .   '=.__.=' `='      *</text>
    <text x="289" y="244">   +                         +</text>
    <text x="289" y="260">        O      *        '       .</text>
  </g>
</svg>
