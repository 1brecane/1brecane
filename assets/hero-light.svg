<svg xmlns="http://www.w3.org/2000/svg" width="880" height="270" viewBox="0 0 880 270" role="img" aria-label="Samuele Ruaro">
  <style>
    .in { animation: fadein 1.4s ease-out both; }
    @keyframes fadein { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .body { animation: pulse 5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.85; } 50% { opacity: 1; } }
    .tw { animation: twinkle 4.5s ease-in-out infinite; }
    @keyframes twinkle { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      .in, .body, .tw { animation: none; }
    }
  </style>

  <text class="in" x="440" y="56" text-anchor="middle" font-family="'Segoe UI',Ubuntu,Roboto,'Helvetica Neue',Arial,sans-serif" font-size="42" font-weight="700" fill="#1b1f27" letter-spacing="1">Samuele Ruaro</text>

  <g fill="#c1272d" font-family="'JetBrains Mono','Fira Code',Consolas,'Liberation Mono',Menlo,monospace" font-size="14" xml:space="preserve">
