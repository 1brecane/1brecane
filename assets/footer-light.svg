<svg xmlns="http://www.w3.org/2000/svg" width="880" height="40" viewBox="0 0 880 40" role="img" aria-label="terminal prompt: rm -rf ~">
  <defs>
    <clipPath id="reveal">
      <rect class="wipe" x="0" y="0" width="0" height="40"/>
    </clipPath>
  </defs>
  <style>
    .wipe { animation: type 0.8s steps(8, end) 0.3s forwards; }
    @keyframes type { to { width: 76.8px; } }
    .cur { animation: appear 0s 1.1s forwards, blink 1.1s steps(1, end) 1.1s infinite; opacity: 0; }
    @keyframes appear { to { opacity: 1; } }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
    @media (prefers-reduced-motion: reduce) {
      .wipe { animation: none; width: 76.8px; }
      .cur { animation: none; opacity: 1; }
    }
  </style>
  <g font-family="'JetBrains Mono','Fira Code',Consolas,'Liberation Mono',Menlo,monospace" font-size="16" fill="#c1272d">
    <text x="392" y="24" textLength="19.2" lengthAdjust="spacing">$ </text>
    <g clip-path="url(#reveal)" transform="translate(411.2, 0)">
      <text x="0" y="24" textLength="76.8" lengthAdjust="spacing">rm -rf ~</text>
    </g>
    <rect class="cur" x="488.0" y="9" width="9" height="16"/>
  </g>
</svg>
