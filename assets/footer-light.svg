<svg xmlns="http://www.w3.org/2000/svg" width="880" height="40" viewBox="0 0 880 40" role="img" aria-label="terminal prompt">
  <style>
    .cur { animation: blink 1.1s steps(1, end) infinite; }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
    @media (prefers-reduced-motion: reduce) {
      .cur { animation: none; }
    }
  </style>
  <g font-family="'JetBrains Mono','Fira Code',Consolas,'Liberation Mono',Menlo,monospace" font-size="16" fill="#c1272d">
    <text x="425" y="24" text-anchor="end">$</text>
    <rect class="cur" x="440" y="9" width="9" height="16"/>
  </g>
</svg>
