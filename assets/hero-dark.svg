<svg xmlns="http://www.w3.org/2000/svg" width="880" height="580" viewBox="0 0 880 580" role="img" aria-label="Samuele Ruaro">
  <style>
    .in { animation: fadein 1.4s ease-out both; }
    @keyframes fadein { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .glow { animation: pulse 5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      .in, .glow { animation: none; }
    }
  </style>

  <text class="in" x="440" y="64" text-anchor="middle" font-family="'Segoe UI',Ubuntu,Roboto,'Helvetica Neue',Arial,sans-serif" font-size="48" font-weight="700" fill="#eceff4" letter-spacing="1">Samuele Ruaro</text>

  <g class="glow" fill="#e5484d" font-family="'JetBrains Mono','Fira Code',Consolas,'Liberation Mono',Menlo,monospace" font-size="36" xml:space="preserve">
    <text x="29.6" y="150" textLength="752.4" lengthAdjust="spacing">   .       +                    *</text>
    <text x="29.6" y="194" textLength="592.8" lengthAdjust="spacing">                 *       +</text>
    <text x="29.6" y="238" textLength="706.8" lengthAdjust="spacing">           '                  |</text>
    <text x="29.6" y="282" textLength="752.4" lengthAdjust="spacing">       ()    .-.,="``"=.    - o -</text>
    <text x="29.6" y="326" textLength="706.8" lengthAdjust="spacing">             '=/_       \     |</text>
    <text x="29.6" y="370" textLength="592.8" lengthAdjust="spacing">          *   |  '=._    |</text>
    <text x="29.6" y="414" textLength="820.8" lengthAdjust="spacing">               \     `=./`,        '</text>
    <text x="29.6" y="458" textLength="798.0" lengthAdjust="spacing">            .   '=.__.=' `='      *</text>
    <text x="29.6" y="502" textLength="684.0" lengthAdjust="spacing">   +                         +</text>
    <text x="29.6" y="546" textLength="752.4" lengthAdjust="spacing">        O      *        '       .</text>
  </g>
</svg>
