<svg xmlns="http://www.w3.org/2000/svg" width="880" height="260" viewBox="0 0 880 260" role="img" aria-label="Samuele Ruaro — fullstack dev, backend at heart">
  <defs>
    <linearGradient id="streak" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#dfe3ea" stop-opacity="0"/>
      <stop offset="1" stop-color="#dfe3ea"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <style>
    .tw { animation: twinkle 4s ease-in-out infinite; }
    @keyframes twinkle { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.8; } }
    .pulse { animation: pulse 5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.45; } 50% { opacity: 0.75; } }
    .pulse2 { animation: pulse2 5s ease-in-out infinite; }
    @keyframes pulse2 { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }
    .shoot { animation: shoot 13s linear infinite; opacity: 0; }
    @keyframes shoot {
      0%, 71% { transform: translate(0, 0); opacity: 0; }
      72%     { opacity: 0.9; }
      78%     { transform: translate(-260px, 96px); opacity: 0; }
      100%    { transform: translate(-260px, 96px); opacity: 0; }
    }
    .in  { animation: fadein 1.4s ease-out both; }
    .in2 { animation: fadein 1.4s ease-out 0.5s both; }
    @keyframes fadein { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @media (prefers-reduced-motion: reduce) {
      .tw, .pulse, .shoot, .in, .in2 { animation: none; }
      .shoot { opacity: 0; }
    }
  </style>

  <!-- twinkling stars -->
  <g fill="#dfe3ea">
    <circle class="tw" cx="90"  cy="60"  r="1.3" style="animation-delay:-0.4s"/>
    <circle class="tw" cx="200" cy="30"  r="1.0" style="animation-delay:-1.6s"/>
    <circle class="tw" cx="320" cy="80"  r="1.2" style="animation-delay:-2.8s"/>
    <circle class="tw" cx="500" cy="40"  r="1.1" style="animation-delay:-0.9s"/>
    <circle class="tw" cx="620" cy="90"  r="1.3" style="animation-delay:-2.1s"/>
    <circle class="tw" cx="750" cy="50"  r="1.0" style="animation-delay:-3.4s"/>
    <circle class="tw" cx="830" cy="110" r="1.2" style="animation-delay:-1.2s"/>
    <circle class="tw" cx="150" cy="130" r="1.0" style="animation-delay:-2.5s"/>
    <circle class="tw" cx="710" cy="150" r="1.1" style="animation-delay:-0.2s"/>
    <circle class="tw" cx="50"  cy="200" r="1.1" style="animation-delay:-3.0s"/>
    <circle class="tw" cx="860" cy="190" r="1.0" style="animation-delay:-1.9s"/>
  </g>

  <!-- shooting star -->
  <g class="shoot">
    <line x1="700" y1="34" x2="760" y2="12" stroke="url(#streak)" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- satellite on dashed orbit, hides behind the planet -->
  <ellipse cx="440" cy="300" rx="360" ry="120" fill="none" stroke="#3a4258" stroke-width="1" stroke-dasharray="3 6"/>
  <circle r="4" fill="#e5484d">
    <animateMotion dur="26s" repeatCount="indefinite" path="M 800,300 a 360,120 0 1,1 -720,0 a 360,120 0 1,1 720,0"/>
  </circle>

  <!-- ascii planet horizon with red rim glow -->
  <circle class="pulse" cx="440" cy="985" r="800" fill="none" stroke="#e5484d" stroke-width="4" filter="url(#glow)"/>
  <g font-family="'JetBrains Mono','Fira Code',Consolas,'Liberation Mono',Menlo,monospace" font-size="15" xml:space="preserve">
    <g class="pulse2" fill="#f25f5f">
      <text x="4" y="196" textLength="585" lengthAdjust="spacing">                                =================================</text>
      <text x="4" y="212" textLength="657" lengthAdjust="spacing">                         =======                                 ========</text>
      <text x="4" y="228" textLength="711" lengthAdjust="spacing">                   ======                                                ======</text>
      <text x="4" y="244" textLength="747" lengthAdjust="spacing">               ====                                                            ====</text>
      <text x="4" y="260" textLength="783" lengthAdjust="spacing">           ====                                                                    ====</text>
    </g>
    <g fill="#5b6577">
      <text x="4" y="212" textLength="585" lengthAdjust="spacing">                                    '.,:     '.,:     '.,:     '.</text>
      <text x="4" y="228" textLength="648" lengthAdjust="spacing">                         ,:     '.,:     '.,:     '.,:     '.,:     '.,:</text>
      <text x="4" y="244" textLength="693" lengthAdjust="spacing">                   '.,:     '.,:     '.,:     '.,:     '.,:     '.,:     '.,:</text>
      <text x="4" y="260" textLength="738" lengthAdjust="spacing">               '.,:     '.,:     '.,:     '.,:     '.,:     '.,:     '.,:     '.,:</text>
    </g>
  </g>

  <text class="in" x="440" y="112" text-anchor="middle" font-family="'Segoe UI',Ubuntu,Roboto,'Helvetica Neue',Arial,sans-serif" font-size="46" font-weight="700" fill="#eceff4" letter-spacing="1">Samuele Ruaro</text>
  <text class="in2" x="440" y="148" text-anchor="middle" font-family="'JetBrains Mono','Fira Code',Consolas,monospace" font-size="16" fill="#9aa4b2">fullstack dev · backend at heart · homelab tinkerer</text>
</svg>
